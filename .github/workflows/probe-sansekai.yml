name: Probe Sansekai API contract

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/probe-sansekai.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Extract routes from the published docs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 2 https://api.sansekai.my.id/ -o /tmp/index.html
          python3 - <<'PY'
          import pathlib, re
          text = pathlib.Path("/tmp/index.html").read_text("utf-8", errors="ignore")
          print("HTML_BYTES", len(text))
          for needle in ("openapi", "SwaggerUIBundle", "paths", "spec:"):
              at = text.find(needle)
              print("MARKER", needle, at)
              if at >= 0:
                  print("CONTEXT", repr(text[max(0,at-300):at+1000]))
          routes = sorted(set(re.findall(r'/(?:api/)?(?:pinedrama|dramabox|reelshort|shortmax|freereels|dramanova|anime|moviebox)/[A-Za-z0-9_./?=&{}:-]+', text)))
          for route in routes:
              print("ROUTE", route)
          print("ROUTE_COUNT", len(routes))
          PY
