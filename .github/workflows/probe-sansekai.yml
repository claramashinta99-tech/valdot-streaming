name: Probe Sansekai API contract

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/probe-sansekai.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Parse the published OpenAPI contract
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 2 https://api.sansekai.my.id/ -o /tmp/index.html
          node <<'NODE'
          const fs = require("fs");
          const vm = require("vm");
          const html = fs.readFileSync("/tmp/index.html", "utf8");
          const start = html.indexOf("const spec =") + "const spec =".length;
          const end = html.indexOf("// Inisialisasi Swagger UI", start);
          const literal = html.slice(start, end).trim().replace(/;\s*$/, "");
          const spec = vm.runInNewContext("(" + literal + ")", Object.create(null), { timeout: 1000 });
          console.log("OPENAPI", spec.info.title, spec.info.version, "paths=" + Object.keys(spec.paths).length);
          for (const [path, pathItem] of Object.entries(spec.paths)) {
            for (const [method, op] of Object.entries(pathItem)) {
              if (!["get","post","put","patch","delete"].includes(method)) continue;
              const params = (op.parameters || []).map(p => p.name + "@" + p.in + ":" + (p.schema?.type || "?") + (p.required ? "*" : "")).join(",");
              console.log("CONTRACT", method.toUpperCase(), path, "|", op.summary || "", "|", params);
            }
          }
          NODE
